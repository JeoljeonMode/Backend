name: CI/CD

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-and-build:
    name: Test and Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Run tests
        run: ./gradlew test

      - name: Build boot jar
        run: ./gradlew bootJar

      - name: Upload boot jar
        uses: actions/upload-artifact@v4
        with:
          name: capstone-backend-jar
          path: build/libs/*.jar
          if-no-files-found: error
          retention-days: 7

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: test-and-build
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'

    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
      SERVICE_NAME: ${{ secrets.DEPLOY_SERVICE_NAME || 'capstone-backend' }}

    steps:
      - name: Check deploy secrets
        id: deploy_secrets
        run: |
          if [ -n "$DEPLOY_HOST" ] && [ -n "$DEPLOY_USER" ] && [ -n "$DEPLOY_SSH_KEY" ] && [ -n "$DEPLOY_PATH" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "Deploy secrets are not configured. Skipping deployment."
          fi

      - name: Download boot jar
        if: steps.deploy_secrets.outputs.ready == 'true'
        uses: actions/download-artifact@v4
        with:
          name: capstone-backend-jar
          path: artifact

      - name: Configure SSH
        if: steps.deploy_secrets.outputs.ready == 'true'
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Upload jar
        if: steps.deploy_secrets.outputs.ready == 'true'
        run: |
          JAR_FILE="$(find artifact -name '*.jar' | head -n 1)"
          ssh -i ~/.ssh/deploy_key "$DEPLOY_USER@$DEPLOY_HOST" "mkdir -p '$DEPLOY_PATH'"
          scp -i ~/.ssh/deploy_key "$JAR_FILE" "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/app.jar"

      - name: Restart service
        if: steps.deploy_secrets.outputs.ready == 'true'
        run: |
          ssh -i ~/.ssh/deploy_key "$DEPLOY_USER@$DEPLOY_HOST" "sudo systemctl restart '$SERVICE_NAME' && sudo systemctl --no-pager --full status '$SERVICE_NAME'"
