spring:
  application:
    name: capstone-fall-monitoring
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:capstone}?useUnicode=true&characterEncoding=UTF-8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul
    username: ${DB_USERNAME:capstone}
    password: ${DB_PASSWORD:capstone}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: ${DDL_AUTO:update}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: false

server:
  port: ${PORT:8083}

app:
  jwt:
    secret: ${JWT_SECRET:capstone-fall-monitoring-secret-key-must-be-at-least-32chars}
    expiration-days: 30
  seed:
    admin-password: ${ADMIN_PASSWORD:admin1234}

logging:
  level:
    com.example.capstone: INFO
    org.springframework.web.servlet.DispatcherServlet: WARN
