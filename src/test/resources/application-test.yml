spring:
  datasource:
    url: jdbc:h2:mem:capstone;MODE=MySQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: validate
    database-platform: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: true

app:
  jwt:
    secret: test-only-secret-key-must-be-at-least-32-characters
  seed:
    admin-password: test-admin-password
