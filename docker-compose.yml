services:
  mysql:
    image: mysql:8.4
    container_name: capstone-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_NAME:-capstone}
      MYSQL_USER: ${DB_USERNAME:-capstone}
      MYSQL_PASSWORD: ${DB_PASSWORD:-capstone}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-root}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  mysql_data:
