spring:
  application:
    name: capstone-fall-monitoring
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:capstone}?useUnicode=true&characterEncoding=UTF-8&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&sslMode=${DB_SSL_MODE:PREFERRED}&createDatabaseIfNotExist=true
    username: ${DB_USERNAME:capstone}
    password: ${DB_PASSWORD:capstone}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: ${DDL_AUTO:validate}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: false
  flyway:
    enabled: ${FLYWAY_ENABLED:true}
    locations: classpath:db/migration
    baseline-on-migrate: ${FLYWAY_BASELINE_ON_MIGRATE:true}
    baseline-version: ${FLYWAY_BASELINE_VERSION:1}

server:
  port: ${PORT:8083}

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration-days: 30
  seed:
    admin-password: ${ADMIN_PASSWORD}

logging:
  level:
    com.example.capstone: INFO
    org.springframework.web.servlet.DispatcherServlet: WARN
