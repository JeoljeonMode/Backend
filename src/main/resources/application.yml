spring:
  application:
    name: capstone-fall-monitoring
  mvc:
    async:
      request-timeout: -1
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:capstone}?useUnicode=true&characterEncoding=UTF-8&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&sslMode=${DB_SSL_MODE:PREFERRED}&createDatabaseIfNotExist=true
    username: ${DB_USERNAME:capstone}
    password: ${DB_PASSWORD:capstone}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 30
      minimum-idle: 5
      connection-timeout: 10000
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: ${DDL_AUTO:validate}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: false
  flyway:
    enabled: ${FLYWAY_ENABLED:true}
    locations: classpath:db/migration
    baseline-on-migrate: ${FLYWAY_BASELINE_ON_MIGRATE:true}
    baseline-version: ${FLYWAY_BASELINE_VERSION:1}

server:
  port: ${PORT:8083}

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration-days: 30
  seed:
    admin-password: ${ADMIN_PASSWORD}
  jetson:
    ai-base-url: ${JETSON_AI_BASE_URL:http://100.85.14.33:5000}
    video-feed-url: ${JETSON_VIDEO_FEED_URL:http://100.85.14.33:5000/video_feed}
    default-bed-id: ${JETSON_DEFAULT_BED_ID:B-206}
    device-bed-map:
      jetson_orin_nano_bed_01: ${JETSON_BED_01_ID:B-206}
      jetson_orin_nano_room_203: ${JETSON_ROOM_203_DEFAULT_BED_ID:B-206}
    video-feed-urls:
      CAM-06: ${JETSON_VIDEO_FEED_URL:http://100.85.14.33:5000/video_feed}
    connect-timeout-ms: ${JETSON_CONNECT_TIMEOUT_MS:3000}
    read-timeout-ms: ${JETSON_READ_TIMEOUT_MS:0}
    retry-delay-ms: ${JETSON_RETRY_DELAY_MS:1000}
    ai-status-timeout-ms: ${JETSON_AI_STATUS_TIMEOUT_MS:5000}

logging:
  level:
    root: INFO
    com.example.capstone: DEBUG
    org.springframework.web: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%X{reqId}] %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%X{reqId}] %logger{36} - %msg%n"
  file:
    name: logs/capstone.log
  logback:
    rollingpolicy:
      max-file-size: 50MB
      max-history: 14
