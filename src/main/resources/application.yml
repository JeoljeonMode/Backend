spring:
  application:
    name: capstone-fall-monitoring
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.mongo.MongoAutoConfiguration
      - org.springframework.boot.autoconfigure.data.mongo.MongoDataAutoConfiguration
      - org.springframework.boot.autoconfigure.data.mongo.MongoRepositoriesAutoConfiguration

server:
  port: ${PORT:8082}

app:
  jwt:
    secret: ${JWT_SECRET:capstone-fall-monitoring-secret-key-must-be-at-least-32chars}
    expiration-days: 30
  seed:
    admin-password: ${ADMIN_PASSWORD:admin1234}

logging:
  level:
    com.example.capstone: INFO
    org.springframework.web.servlet.DispatcherServlet: WARN
    org.mongodb.driver.cluster: WARN
